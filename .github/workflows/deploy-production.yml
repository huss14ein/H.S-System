name: Deploy Production

# Publishes https://finova-hussein.netlify.app (Wealth Analytics, AI, latest Dashboard split).
# Requires ONE of: NETLIFY_AUTH_TOKEN+NETLIFY_SITE_ID, NETLIFY_BUILD_HOOK, or Netlify Git link to this repo.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, and unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build
        env:
          COMMIT_REF: ${{ github.sha }}
          GITHUB_SHA: ${{ github.sha }}
          VITE_CANONICAL_APP_URL: https://finova-hussein.netlify.app

      - name: Verify Wealth Analytics in dist
        run: |
          test -f dist/index.html
          grep -q 'name="finova-build-sha"' dist/index.html
          grep -q 'name="finova-app"' dist/index.html
          grep -q 'content="hs-system-vite"' dist/index.html
          grep -rl 'Wealth Analytics' dist/assets/*.js > /dev/null
          EXPECT_SHA="${GITHUB_SHA:0:7}"
          grep -q "content=\"${EXPECT_SHA}\"" dist/index.html
          echo "Build stamp ${EXPECT_SHA} OK; Wealth Analytics present in bundle"

      - name: Publish to Netlify production
        id: publish
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID || '801d32fc-62bd-4211-8520-b5c1dea9dcae' }}
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set +e
          node scripts/netlify-production-deploy.mjs
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Netlify CLI publish skipped::Git-linked build + netlify-self-publish.mjs will publish when NETLIFY_AUTH_TOKEN is set in Netlify site env."
          fi

      - name: Ensure production serves this commit
        env:
          EXPECT_SHA: ${{ github.sha }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID || '801d32fc-62bd-4211-8520-b5c1dea9dcae' }}
        run: node scripts/netlify-ensure-production-live.mjs

      - name: Smoke test AI proxy CORS on production
        run: |
          ORIGIN="https://finova-hussein.netlify.app"
          HEALTH=$(curl -sfL -X POST "${ORIGIN}/api/gemini-proxy" \
            -H "Content-Type: application/json" \
            -H "Origin: ${ORIGIN}" \
            -d '{"health":true}')
          echo "$HEALTH" | grep -q 'anyProviderConfigured'
          echo "AI proxy OK with browser Origin on ${ORIGIN}"
