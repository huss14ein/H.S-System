name: Deploy Production

# Publishes https://finova-hussein.netlify.app on every main push (SPA + functions + same-origin AI).
# Netlify Git auto-deploy also runs from netlify.toml when the site is linked to this repo.
# Optional: NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID for GitHub Actions CLI deploy.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, and unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build
        env:
          COMMIT_REF: ${{ github.sha }}
          GITHUB_SHA: ${{ github.sha }}
          VITE_CANONICAL_APP_URL: https://finova-hussein.netlify.app

      - name: Verify Wealth Analytics and build stamp in dist
        run: |
          test -f dist/index.html
          grep -q 'name="finova-build-sha"' dist/index.html
          grep -q 'name="finova-app"' dist/index.html
          grep -q 'content="hs-system-vite"' dist/index.html
          grep -rl 'Wealth Analytics' dist/assets/*.js > /dev/null
          EXPECT_SHA="${GITHUB_SHA:0:7}"
          grep -q "content=\"${EXPECT_SHA}\"" dist/index.html
          echo "Build stamp ${EXPECT_SHA} verified in dist/index.html"

      - name: Deploy to Netlify production
        id: netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "${NETLIFY_AUTH_TOKEN:-}" ] || [ -z "${NETLIFY_SITE_ID:-}" ]; then
            echo "::notice title=Netlify CLI deploy skipped::Site may still auto-deploy via Netlify Git link + netlify.toml."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npx netlify deploy --prod --dir=dist --message "Deploy ${GITHUB_SHA:0:7} from GitHub Actions"
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      - name: Smoke test finova-hussein.netlify.app
        env:
          EXPECT_SHA: ${{ github.sha }}
        run: |
          SITE_URL="https://finova-hussein.netlify.app"
          SHORT_SHA="${EXPECT_SHA:0:7}"
          echo "Checking ${SITE_URL} (expect build sha ${SHORT_SHA})"
          sleep 15
          HTTP_CODE=$(curl -sfL -o /tmp/finova-index.html -w '%{http_code}' "${SITE_URL}/?nocache=$(date +%s)" || echo "000")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning title=Netlify production::${SITE_URL} returned HTTP ${HTTP_CODE}"
            exit 0
          fi
          HTML=$(cat /tmp/finova-index.html)
          if echo "$HTML" | grep -q 'esm.sh/react'; then
            echo "::warning title=Stale Netlify bundle::${SITE_URL} still serves old importmap prototype — link Netlify site to this repo or set NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID."
            exit 0
          fi
          echo "$HTML" | grep -q 'name="finova-app"'
          LIVE_SHA=$(echo "$HTML" | sed -n 's/.*name="finova-build-sha" content="\([^"]*\)".*/\1/p' | head -1)
          echo "Live sha: ${LIVE_SHA} (push sha ${SHORT_SHA})"
          ORIGIN="${SITE_URL%/}"
          HEALTH=$(curl -sfL -X POST "${ORIGIN}/api/gemini-proxy" \
            -H "Content-Type: application/json" \
            -H "Origin: ${ORIGIN}" \
            -d '{"health":true}' || true)
          if echo "$HEALTH" | grep -q 'anyProviderConfigured'; then
            echo "AI proxy health OK with browser Origin at ${ORIGIN}"
          else
            echo "::warning title=AI proxy CORS::Health with Origin failed: ${HEALTH}"
          fi
