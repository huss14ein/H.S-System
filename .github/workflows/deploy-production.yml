name: Deploy Production

# Builds and publishes dist/ to https://finova-hussein.netlify.app on every main push.
# One-time setup: GitHub → Settings → Secrets → NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID (finova-hussein site).
# Vercel continues to deploy from its own GitHub integration as an optional mirror.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, and unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build
        env:
          COMMIT_REF: ${{ github.sha }}
          GITHUB_SHA: ${{ github.sha }}
          VITE_CANONICAL_APP_URL: https://finova-hussein.netlify.app

      - name: Verify Wealth Analytics and build stamp in dist
        run: |
          test -f dist/index.html
          grep -q 'name="finova-build-sha"' dist/index.html
          grep -q 'name="finova-app"' dist/index.html
          grep -q 'content="hs-system-vite"' dist/index.html
          grep -rl 'Wealth Analytics' dist/assets/*.js > /dev/null
          EXPECT_SHA="${GITHUB_SHA:0:7}"
          grep -q "content=\"${EXPECT_SHA}\"" dist/index.html
          echo "Build stamp ${EXPECT_SHA} verified in dist/index.html"

      - name: Deploy to Netlify production
        id: netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "${NETLIFY_AUTH_TOKEN:-}" ] || [ -z "${NETLIFY_SITE_ID:-}" ]; then
            echo "::error title=Netlify deploy blocked::Add NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID to GitHub repository secrets so main auto-deploys to https://finova-hussein.netlify.app."
            exit 1
          fi
          npx netlify deploy --prod --dir=dist --message "Deploy ${GITHUB_SHA:0:7} from GitHub Actions"
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      - name: Smoke test Netlify production URL
        if: steps.netlify.outputs.deployed == 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          EXPECT_SHA: ${{ github.sha }}
        run: |
          SITE_URL=$(npx netlify api getSite --data "{\"site_id\":\"${NETLIFY_SITE_ID}\"}" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const j=JSON.parse(d);console.log(j.ssl_url||j.url);});")
          SHORT_SHA="${EXPECT_SHA:0:7}"
          echo "Checking ${SITE_URL} (expect build sha ${SHORT_SHA})"
          HTTP_CODE=$(curl -sfL -o /tmp/finova-index.html -w '%{http_code}' "${SITE_URL}/?nocache=$(date +%s)")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error title=Netlify production not serving app::${SITE_URL} returned HTTP ${HTTP_CODE} (expected 200 with finova-app meta)."
            exit 1
          fi
          HTML=$(cat /tmp/finova-index.html)
          echo "$HTML" | grep -q 'name="finova-app"'
          echo "$HTML" | grep -q 'name="finova-build-sha"'
          echo "$HTML" | grep -q "content=\"${SHORT_SHA}\""
          echo "$HTML" | grep -qv 'esm.sh/react'
          grep -rl 'Wealth Analytics' dist/assets/*.js > /dev/null
          echo "Netlify production serves latest H.S-System Vite app at ${SITE_URL} (sha ${SHORT_SHA})"
          ORIGIN="${SITE_URL%/}"
          HEALTH=$(curl -sfL -X POST "${ORIGIN}/api/gemini-proxy" \
            -H "Content-Type: application/json" \
            -H "Origin: ${ORIGIN}" \
            -d '{"health":true}')
          echo "$HEALTH" | grep -q 'anyProviderConfigured'
          echo "AI proxy health OK with browser Origin header at ${ORIGIN}"

      - name: Smoke test Vercel mirror (optional)
        continue-on-error: true
        run: |
          SITE_URL="https://h-s-system.vercel.app"
          EXPECT_SHA="${GITHUB_SHA:0:7}"
          HTML=$(curl -sfL "${SITE_URL}/?nocache=$(date +%s)" || true)
          if [ -z "$HTML" ]; then
            echo "::warning::Vercel mirror unreachable"
            exit 0
          fi
          LIVE_SHA=$(echo "$HTML" | sed -n 's/.*name="finova-build-sha" content="\([^"]*\)".*/\1/p' | head -1)
          echo "Vercel mirror build sha: ${LIVE_SHA} (push sha ${EXPECT_SHA})"
