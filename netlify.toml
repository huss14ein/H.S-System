[build]
  command = "npm ci && npm run test && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Increase the timeout for the AI proxy function to prevent 504 errors
# on long-running Gemini API requests. Default is 10s, max is 26s.
[functions."gemini-proxy"]
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for production
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # CSP: include fonts (Inter), live market data (Finnhub, Stooq, Binance, CoinGecko), Supabase REST+Realtime, AI APIs, Netlify preview iframe + RUM
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.googleapis.com https://generativelanguage.googleapis.com https://api.anthropic.com https://api.x.ai https://api.openai.com https://finnhub.io https://stooq.com https://api.coingecko.com https://api.binance.com https://ingesteer.services-prod.nsvcs.net; frame-ancestors 'none'; frame-src 'self' https://app.netlify.com;"
