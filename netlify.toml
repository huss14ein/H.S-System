[build]
  command = "npm ci && npm run test && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_CANONICAL_APP_URL = "https://finova-hussein.netlify.app"

# Functions do not inherit `[build.environment]` — mirror canonical origin here for AI/market proxy CORS.
[context.all.environment]
  FINOVA_CANONICAL_APP_URL = "https://finova-hussein.netlify.app"
  ALLOWED_ORIGINS = "https://finova-hussein.netlify.app,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8888"

[functions]
  directory = "netlify/functions"

# Dev server command for Netlify CLI; site Environment variables apply to functions when linked.
[dev]
  command = "npm run dev:vite"
  port = 5173
  publish = "dist"

# Increase the timeout for the AI proxy function to prevent 504 errors
# on long-running Gemini API requests. Default is 10s, max is 26s.
[functions."gemini-proxy"]
  timeout = 26

[functions."sahmk-proxy"]
  timeout = 15

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA client-side routing (Vite build). Preview deploy permalinks redirect to production via index.html script.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Login/signup shell CSS (small, unhashed) — short cache so deploys pick up auth-shell changes quickly.
[[headers]]
  for = "/auth-shell.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Hashed Vite assets are immutable — long cache improves repeat visits without affecting deploy safety (index.html still revalidates).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA shell must revalidate so clients don’t keep an old index that references deleted hashed JS chunks (dynamic import failures).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers for production
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # CSP: include fonts (Inter), live market data (Finnhub, Stooq, Binance, CoinGecko), Supabase REST+Realtime, AI APIs, Netlify preview iframe + RUM
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.googleapis.com https://generativelanguage.googleapis.com https://api.anthropic.com https://api.x.ai https://api.openai.com https://finnhub.io https://stooq.com https://api.coingecko.com https://api.binance.com https://ingesteer.services-prod.nsvcs.net; frame-ancestors 'none'; frame-src 'self' https://app.netlify.com;"
