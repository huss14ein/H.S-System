<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finova</title>
    <!-- Login LCP: system font + minimal rules before any JS; full utilities load from auth-shell.css in parallel. -->
    <style>
      html{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      body{margin:0;background:#f8fafc;color:#1f2937;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
    </style>
    <link rel="stylesheet" href="/auth-shell.css" />
    <meta name="theme-color" content="#ffffff" />
  </head>
  <body class="bg-light text-gray-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      (function () {
        function loadInter() {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href =
            'https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=optional';
          document.head.appendChild(link);
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadInter, { timeout: 2500 });
        } else {
          window.addEventListener('load', loadInter, { once: true });
        }
      })();
    </script>
  </body>
</html>
